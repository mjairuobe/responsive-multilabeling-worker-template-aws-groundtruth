<!--
  AWS SageMaker Ground Truth – Worker Task Template
  Multi-Label Text Classification using the NATIVE crowd-classifier-multi-select element.

  Use this variant when you want Ground Truth's standard multi-label output format:
      { "<name>": { "labels": ["label_a", "label_b"] } }

  Liquid variables expected (task.input):
      taskObject : (string) the text to classify        [required]
      labels     : (array)  list of label strings        [required]
      header     : (string) optional task headline        [optional]

  Pre-labeling: crowd-classifier-multi-select does not expose a public "pre-check categories"
  attribute, so pre-selection is applied via JS using task.input.preLabels (see script at bottom).

  This file keeps the native widget but wraps it so that the page does not scroll and the
  Submit button stays visible on mobile (the long text scrolls inside its own region).
-->
<script src="https://assets.crowd.aws/crowd-html-elements.js"></script>

<style>
  :root {
    --bg: #ffffff;
    --surface: #f7f8fa;
    --border: #e2e6ec;
    --text: #232a32;
    --text-muted: #5c6773;
    --accent: #2f6f8f;
    --focus: #2f6f8f;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#11151a; --surface:#171c22; --border:#2a323b; --text:#e7ebef; --text-muted:#9aa6b2; --accent:#6fb3cf; --focus:#6fb3cf; }
  }
  * { box-sizing: border-box; }
  html, body { margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  crowd-form { display:block; }

  /* Natural document flow (NOT 100vh): a full-viewport layout collapses to a
     blank UI inside Ground Truth's content-sized iframe. */
  .app { display:flex; flex-direction:column; max-width:820px; margin:0 auto; }

  /* The classification-target text region is the scrollable part (bounded in px
     so it never collapses inside the iframe). */
  crowd-classifier-multi-select { display:block; }

  classification-target {
    display:block;
    max-height: 440px;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap:anywhere;
    font-size: clamp(1.0625rem, 1rem + 0.7vw, 1.25rem);
    line-height:1.7;
    max-width: 46ch;
    hyphens: auto;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

  /* Compact, eye-friendly spacing around the widget */
  .app__pad { padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); }
</style>

<crowd-form>
  <script type="application/json" id="gt-prelabels">{% if task.input.preLabels %}{{ task.input.preLabels | to_json }}{% else %}[]{% endif %}</script>

  <div class="app">
    <div class="app__pad">
      <crowd-classifier-multi-select
        name="multiLabel"
        categories="{{ task.input.labels | to_json | escape }}"
        header="{{ task.input.header | default: 'Wähle alle zutreffenden Labels' }}"
        exclusion-category="{ text: 'Keine zutreffend' }"
      >
        <classification-target>{{ task.input.taskObject }}</classification-target>

        <full-instructions header="Anleitung">
          <ol>
            <li><strong>Lies</strong> den Text aufmerksam.</li>
            <li><strong>Wähle</strong> alle zutreffenden Labels (Mehrfachauswahl).</li>
            <li>Trifft nichts zu, wähle <strong>„Keine zutreffend“</strong>.</li>
          </ol>
          <p>Vorausgewählte Labels stammen ggf. aus einem automatischen Vorschlag – bitte prüfen.</p>
        </full-instructions>

        <short-instructions>
          Wähle alle Labels, die auf den Text zutreffen.
        </short-instructions>
      </crowd-classifier-multi-select>
    </div>
  </div>
</crowd-form>

<script>
(function () {
  "use strict";
  // Ground Truth HTML-escapes the to_json output (a double quote becomes the
  // &quot; entity); decode before JSON.parse, since entities are not decoded
  // inside <script>. (Do not put Liquid-like braces in comments -- GT would try
  // to evaluate them and the template would fail to render.)
  function decodeEntities(s) {
    if (!s || s.indexOf("&") === -1) return s;
    var ta = document.createElement("textarea");
    ta.innerHTML = s;
    return ta.value;
  }
  function parseJSON(id, fb) {
    var el = document.getElementById(id);
    if (!el) return fb;
    try { var v = JSON.parse(decodeEntities((el.textContent || "").trim()) || "null"); return v == null ? fb : v; }
    catch (e) { return fb; }
  }
  var preLabels = parseJSON("gt-prelabels", []);
  if (!Array.isArray(preLabels) || preLabels.length === 0) return;

  // Pre-select categories once the native widget is fully initialized.
  document.addEventListener("all-crowd-elements-ready", function () {
    try {
      var widget = document.querySelector("crowd-classifier-multi-select");
      if (!widget || !widget.shadowRoot) return;
      var want = {};
      preLabels.forEach(function (l) { want[String(l).trim()] = true; });

      // Click the matching category buttons inside the shadow DOM.
      var nodes = widget.shadowRoot.querySelectorAll("button, [role='checkbox'], .category");
      nodes.forEach(function (n) {
        var txt = (n.textContent || "").trim();
        if (want[txt]) {
          var pressed = n.getAttribute("aria-pressed") === "true" || n.getAttribute("aria-checked") === "true";
          if (!pressed) n.click();
        }
      });
    } catch (e) { /* non-fatal: worker can still select manually */ }
  });
})();
</script>
