name: Deploy to AWS

# Deployt den Repo-Inhalt nach AWS:
#   - Ground-Truth-Templates  -> s3://$TEMPLATE_BUCKET/templates/
#   - Standalone-PWA           -> s3://$PWA_BUCKET/
#
# Authentifizierung via GitHub OIDC (keine statischen AWS-Keys).
# Die IAM-Rolle (vars.AWS_ROLE_ARN) muss dem OIDC-Provider vertrauen und auf
# refs/heads/main eingeschränkt sein (siehe docs/deployment.md).

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # manuelles Auslösen über die Actions-UI

permissions:
  id-token: write           # erforderlich, damit GitHub ein OIDC-Token ausstellt
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Kein `environment:` hier! Sonst wird der OIDC-sub-Claim zu
    #   repo:OWNER/REPO:environment:<name>
    # und passt nicht mehr zur Trust Policy (die auf :ref:refs/heads/main filtert).
    # Willst du eine Environment mit Required Reviewers nutzen, siehe docs/deployment.md
    # (dann muss die Trust Policy auf :environment:<name> umgestellt werden).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify identity
        run: aws sts get-caller-identity

      # Validate the template with Ground Truth's own renderer BEFORE uploading.
      # Catches Liquid/crowd errors (e.g. stray braces in comments) so a broken
      # template never reaches S3. Does NOT create any labeling job.
      - name: Render & validate UI template
        env:
          RENDER_ROLE_ARN: ${{ vars.SAGEMAKER_EXECUTION_ROLE_ARN || 'arn:aws:iam::423623826655:role/service-role/AmazonSageMaker-ExecutionRole-20260621T183838' }}
        run: |
          TASK_INPUT='{"taskObject":"😀 Tolles Produkt, aber der Versand war langsam. Der Support war sehr hilfsbereit.","labels":["Freude","Wut","Trauer","Überraschung","Frage","Beschwerde","Lob"],"preLabels":["Freude","Lob"]}'
          for f in template.liquid.html template.multiselect.liquid.html; do
            echo "::group::render $f"
            jq -n --rawfile c "$f" --arg role "$RENDER_ROLE_ARN" --arg input "$TASK_INPUT" \
              '{UiTemplate:{Content:$c}, Task:{Input:$input}, RoleArn:$role}' > render.json
            aws sagemaker render-ui-template --cli-input-json file://render.json --region "${{ vars.AWS_REGION }}" > render-out.json
            ERRS=$(jq '.Errors | length' render-out.json)
            if [ "$ERRS" != "0" ]; then
              echo "::error::render-ui-template meldet Fehler in $f:"; jq '.Errors' render-out.json; exit 1
            fi
            echo "$f: OK ($(jq -r '.RenderedContent' render-out.json | wc -c) Bytes, keine Fehler)"
            echo "::endgroup::"
          done

      - name: Upload Ground Truth worker templates
        run: |
          aws s3 cp template.liquid.html \
            "s3://${{ vars.TEMPLATE_BUCKET }}/templates/template.liquid.html" \
            --content-type "text/html; charset=utf-8"
          aws s3 cp template.multiselect.liquid.html \
            "s3://${{ vars.TEMPLATE_BUCKET }}/templates/template.multiselect.liquid.html" \
            --content-type "text/html; charset=utf-8"

      - name: Deploy standalone PWA
        run: |
          # Statische Assets lange cachen ...
          aws s3 sync standalone/ "s3://${{ vars.PWA_BUCKET }}/" \
            --delete \
            --exclude "service-worker.js" \
            --exclude "manifest.webmanifest" \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          # ... aber Einstiegspunkte/SW nie aggressiv cachen, sonst keine Updates beim Client
          aws s3 cp standalone/index.html "s3://${{ vars.PWA_BUCKET }}/index.html" \
            --content-type "text/html; charset=utf-8" --cache-control "no-cache"
          aws s3 cp standalone/manifest.webmanifest "s3://${{ vars.PWA_BUCKET }}/manifest.webmanifest" \
            --content-type "application/manifest+json" --cache-control "no-cache"
          aws s3 cp standalone/service-worker.js "s3://${{ vars.PWA_BUCKET }}/service-worker.js" \
            --content-type "application/javascript; charset=utf-8" --cache-control "no-cache"

      # Optional: CloudFront-Cache invalidieren (Variable CLOUDFRONT_DISTRIBUTION_ID setzen
      # und cloudfront:CreateInvalidation in der Permission-Policy erlauben).
      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
